<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Escalera Infinita</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#07071a;overflow:hidden;touch-action:none}
#gw{background:#0d0d1a;border-radius:12px;overflow:hidden;width:100%;outline:none;user-select:none;display:flex;flex-direction:column;height:100vh;max-width:700px;margin:0 auto}
#hud{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:#111128;border-bottom:2px solid #2d2d6e;gap:6px;flex-shrink:0}
.hb{background:#1a1a3e;border-radius:8px;padding:3px 8px;color:#e2e8f0;font-size:11px;font-weight:700;min-width:52px;text-align:center}
.hl{color:#94a3b8;font-size:9px;display:block}
.hv{color:#fbbf24;font-size:14px;font-weight:800}
#pbar{display:flex;gap:5px;align-items:center;padding:5px 10px;background:#0e0e24;border-bottom:1px solid #1e1e4e;flex-shrink:0}
.pw{width:40px;height:40px;border-radius:8px;border:2px solid #2d2d6e;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:16px;cursor:pointer;position:relative;transition:border-color .15s,transform .1s;background:#131330;touch-action:manipulation}
.pw:active{border-color:#6366f1;transform:scale(1.07)}
.pw.active{border-color:#22c55e;background:#0f2d1a}
.pw.empty{opacity:.35}
.pw-key{font-size:8px;color:#64748b;font-weight:700;margin-top:1px}
.pw-count{position:absolute;top:-4px;right:-4px;background:#6366f1;color:white;font-size:9px;font-weight:800;border-radius:10px;min-width:14px;height:14px;display:flex;align-items:center;justify-content:center;padding:0 3px}
#cc{position:relative;overflow:hidden;flex:1;background:#07071a;min-height:0}
canvas{display:block;width:100%;height:100%}
#cp{position:absolute;bottom:0;left:0;right:0;background:rgba(8,8,32,.97);border-top:2px solid #4f46e5;padding:10px 14px 8px;transform:translateY(100%);transition:transform .22s ease;z-index:15}
#ct{color:#a5b4fc;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
#cq{color:#f1f5f9;font-size:14px;font-weight:700;margin-bottom:8px}
#co{display:flex;gap:6px;flex-wrap:wrap}
.ob{flex:1;min-width:80px;background:#1e1b4b;border:1.5px solid #4f46e5;color:#c7d2fe;border-radius:10px;padding:10px 8px;font-size:14px;font-weight:700;cursor:pointer;transition:background .12s,border-color .12s;text-align:center;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.ob:active{background:#312e81;border-color:#818cf8}
.ob.ok{background:#14532d;border-color:#22c55e;color:#bbf7d0}
.ob.bad{background:#7f1d1d;border-color:#ef4444;color:#fecaca}
#fm{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);font-size:20px;font-weight:800;padding:8px 20px;border-radius:12px;color:white;pointer-events:none;z-index:30;opacity:0;transition:opacity .18s;white-space:nowrap}
#fm.sh{opacity:1}
#fm.ok{background:#15803d}
#fm.fail{background:#b91c1c}
#fm.pow{background:#7c3aed}
#go{display:none;position:absolute;inset:0;background:rgba(0,0,0,.87);z-index:40;flex-direction:column;align-items:center;justify-content:center;gap:12px}
#go h2{color:#f87171;font-size:26px;font-weight:800}
#go p{color:#cbd5e1;font-size:14px;text-align:center}
#rb{background:#4f46e5;color:white;border:none;border-radius:10px;padding:12px 32px;font-size:15px;font-weight:700;cursor:pointer;touch-action:manipulation}
#ss{position:absolute;inset:0;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:40;padding:20px}
#ss h1{color:#818cf8;font-size:24px;font-weight:800}
#ss p{color:#94a3b8;font-size:13px;text-align:center;max-width:320px;line-height:1.6}
#sb{background:#4f46e5;color:white;border:none;border-radius:10px;padding:13px 38px;font-size:16px;font-weight:700;cursor:pointer;touch-action:manipulation}

/* ── CONTROLES TÁCTILES ── */
#touch-controls{display:none;flex-shrink:0;background:#09091f;border-top:1px solid #1e1e4e;padding:8px 12px;gap:10px;align-items:center;justify-content:space-between;height:90px}
.tc-side{display:flex;gap:8px}
.tc-btn{width:68px;height:68px;border-radius:16px;border:2px solid #2d2d6e;background:#131330;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;transition:background .1s,border-color .1s,transform .08s}
.tc-btn:active,.tc-btn.pressed{background:#1e1b4b;border-color:#6366f1;transform:scale(0.93)}
#tc-jump{width:78px;height:78px;border-radius:20px;font-size:34px;background:#1e1b4b;border-color:#6366f1}
#tc-jump:active,#tc-jump.pressed{background:#312e81;transform:scale(0.91)}

/* Mostrar controles táctiles solo en touch */
@media (hover: none) and (pointer: coarse) {
  #touch-controls{display:flex}
  #pbar .pw-key{display:none}
  #ss p .keys-hint{display:none}
}
</style>
</head>
<body>
<div id="gw" tabindex="0">
  <!-- HUD -->
  <div id="hud">
    <div class="hb"><span class="hl">Piso</span><span class="hv" id="fv">0</span></div>
    <div class="hb"><span class="hl">Vidas</span><span class="hv" id="lv">♥♥♥</span></div>
    <div class="hb"><span class="hl">Puntos</span><span class="hv" id="sv">0</span></div>
    <div class="hb"><span class="hl">Racha</span><span class="hv" id="stv">0</span></div>
  </div>

  <!-- Poderes -->
  <div id="pbar">
    <span style="color:#475569;font-size:11px;margin-right:4px">Poderes:</span>
    <div class="pw empty" id="pw0" title="Doble salto (E)">🦅<span class="pw-key">E</span><span class="pw-count" id="pc0">0</span></div>
    <div class="pw empty" id="pw1" title="Escudo (R)">🛡️<span class="pw-key">R</span><span class="pw-count" id="pc1">0</span></div>
    <div class="pw empty" id="pw2" title="Revelar (F)">🔍<span class="pw-key">F</span><span class="pw-count" id="pc2">0</span></div>
  </div>

  <!-- Canvas -->
  <div id="cc">
    <canvas id="c"></canvas>
    <div id="fm"></div>
    <div id="cp"><div id="ct">Reto para subir!</div><div id="cq"></div><div id="co"></div></div>
    <div id="go"><h2>Game Over</h2><p id="gop"></p><button id="rb">Jugar de nuevo</button></div>
    <div id="ss">
      <h1>🧱 Escalera Infinita</h1>
      <p>
        <span class="keys-hint">Pulsa <b>W</b> o <b>Espacio</b> para saltar.<br>Usa <b>A / D</b> para moverte.<br><br></span>
        Responde preguntas para seguir subiendo.<br>
        <span style="color:#6366f1;margin-top:6px;display:block">📱 En móvil: usa los botones de abajo</span>
      </p>
      <button id="sb">¡Jugar!</button>
    </div>
  </div>

  <!-- Controles táctiles -->
  <div id="touch-controls">
    <div class="tc-side">
      <div class="tc-btn" id="tc-left">◀</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <div class="tc-btn" id="tc-pow0">🦅</div>
      <div class="tc-btn" id="tc-jump">⬆</div>
      <div class="tc-btn" id="tc-pow1">🛡️</div>
      <div class="tc-btn" id="tc-pow2">🔍</div>
    </div>
    <div class="tc-side">
      <div class="tc-btn" id="tc-right">▶</div>
    </div>
  </div>
</div>

<script>
// ── CANVAS RESIZE ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resizeCanvas() {
  const cc = document.getElementById('cc');
  const rect = cc.getBoundingClientRect();
  W = Math.floor(rect.width);
  H = Math.floor(rect.height);
  canvas.width = W;
  canvas.height = H;
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); });

// ── CONSTANTES ──
const SW = Math.min(160, W * 0.38);
const SH = 16;
const PW = 24, PH = 32;
const GRAV = 0.55;
const FLOOR_Y = () => H * 0.85;
const STEP_GAP = 74;
const COLORS = ['#4f46e5','#7c3aed','#0891b2','#059669','#d97706','#db2777','#0369a1','#047857'];

const QUESTIONS = [
  {q:"¿Qué animal dice muu?",opts:["Perro","Vaca","Gato","Pato"],ans:1},
  {q:"¿De qué color es el sol?",opts:["Azul","Verde","Amarillo","Rojo"],ans:2},
  {q:"¿Cuántos dedos tienes en una mano?",opts:["3","4","6","5"],ans:3},
  {q:"¿Qué animal vuela?",opts:["Pez","Pájaro","Perro","Vaca"],ans:1},
  {q:"¿De qué color es el cielo?",opts:["Rojo","Rosa","Azul","Verde"],ans:2},
  {q:"¿Qué fruta es roja y redonda?",opts:["Plátano","Manzana","Lima","Uva"],ans:1},
  {q:"¿Cuánto es 1 + 1?",opts:["1","3","2","4"],ans:2},
  {q:"¿Qué hace el perro?",opts:["Miau","Muu","Cuac","Guau"],ans:3},
  {q:"¿Cuántos ojos tienes?",opts:["3","1","4","2"],ans:3},
  {q:"¿De qué color es la hierba?",opts:["Azul","Verde","Amarilla","Morada"],ans:1},
  {q:"¿Qué animal tiene trompa?",opts:["León","Elefante","Tigre","Jirafa"],ans:1},
  {q:"¿Cuánto es 2 + 1?",opts:["2","4","3","5"],ans:2},
  {q:"¿Qué forma tiene la luna?",opts:["Cuadrada","Triangular","Redonda","Plana"],ans:2},
  {q:"¿Qué animal tiene rayas negras y naranjas?",opts:["León","Cebra","Tigre","Oso"],ans:2},
  {q:"¿Cuánto es 3 - 1?",opts:["1","3","4","2"],ans:3},
  {q:"¿Qué animal vive en el agua?",opts:["Perro","Gato","Pez","Caballo"],ans:2},
  {q:"¿De qué color es el tomate?",opts:["Azul","Rojo","Verde","Morado"],ans:1},
  {q:"¿Cuánto es 1 + 2?",opts:["4","2","3","5"],ans:2},
  {q:"¿Qué animal salta mucho?",opts:["Tortuga","Conejo","Pez","Elefante"],ans:1},
  {q:"¿De qué color es la nieve?",opts:["Gris","Azul","Blanca","Negra"],ans:2},
  {q:"¿Cuántos lados tiene un triángulo?",opts:["4","2","5","3"],ans:3},
  {q:"¿Qué fruta es amarilla y larga?",opts:["Manzana","Fresa","Plátano","Naranja"],ans:2},
  {q:"¿Cuánto es 2 + 2?",opts:["3","4","5","6"],ans:1},
  {q:"¿Qué animal hace cuac?",opts:["Gato","Vaca","Pato","Perro"],ans:2},
  {q:"¿De qué color es la zanahoria?",opts:["Roja","Naranja","Amarilla","Verde"],ans:1},
  {q:"¿Cuánto es 4 - 2?",opts:["3","1","2","4"],ans:2},
  {q:"¿Dónde viven los peces?",opts:["En árboles","En el agua","En el cielo","En cuevas"],ans:1},
  {q:"¿Cuántos lados tiene un cuadrado?",opts:["3","5","4","6"],ans:2},
  {q:"¿Qué animal tiene cuello muy largo?",opts:["Hipopótamo","Jirafa","Oso","Cocodrilo"],ans:1},
  {q:"¿Cuánto es 5 + 1?",opts:["5","7","8","6"],ans:3},
];

let steps, player, lives, score, floor, streak, challengeOn, running, bobT, particles, powers;
let keys = {}; let currentQ = null; let jumpPressed = false;
let camY = 0;

function rand(a, b) { return a + Math.floor(Math.random() * (b - a + 1)); }

function initGame() {
  resizeCanvas();
  steps = []; floor = 0; score = 0; lives = 3; streak = 0;
  challengeOn = false; bobT = 0; particles = [];
  powers = { wing: 0, shield: 0, reveal: 0 };
  currentQ = null; jumpPressed = false; camY = 0;

  for (let i = 0; i < 9; i++) {
    const sw = Math.min(160, W * 0.38);
    const x = 60 + Math.random() * (W - sw - 60);
    const y = FLOOR_Y() - i * STEP_GAP;
    steps.push(makeStep(x, y, i));
  }

  const s0 = steps[0];
  player = {
    x: s0.x + getStepW() / 2 - PW / 2,
    y: s0.y - PH,
    vy: 0, vx: 0,
    onStep: s0,
    airborne: false,
    toStep: null,
    djUsed: false,
    dir: 1, walkT: 0,
    shielded: false
  };

  updateHUD();
  document.getElementById('cp').style.transform = 'translateY(100%)';
  document.getElementById('go').style.display = 'none';
}

function getStepW() { return Math.min(160, W * 0.38); }

function makeStep(x, y, id) {
  return { x, y, color: COLORS[id % COLORS.length], id, done: false,
    hasPow: id > 0 && Math.random() < 0.28, powType: rand(0, 2) };
}

function updateHUD() {
  document.getElementById('fv').textContent = floor;
  document.getElementById('sv').textContent = score;
  document.getElementById('stv').textContent = streak;
  let h = ''; for (let i = 0; i < 3; i++) h += i < lives ? '♥' : '♡';
  document.getElementById('lv').textContent = h;
  document.getElementById('lv').style.color = lives > 1 ? '#fbbf24' : '#ef4444';
  ['wing', 'shield', 'reveal'].forEach((k, i) => {
    document.getElementById('pc' + i).textContent = powers[k];
    document.getElementById('pw' + i).classList.toggle('empty', powers[k] === 0);
    document.getElementById('tc-pow' + i)?.classList.toggle('empty', powers[k] === 0);
  });
}

function ensureSteps() {
  const sw = getStepW();
  while (steps.length > 0 && steps.length < 16) {
    const top = steps[steps.length - 1];
    let nx; let t = 0;
    do { nx = 50 + Math.random() * (W - sw - 50); t++; } while (Math.abs(nx - top.x) < 70 && t < 20);
    const ny = top.y - STEP_GAP - Math.random() * 10;
    steps.push(makeStep(nx, ny, top.id + 1));
  }
}

function nextStep() {
  const idx = steps.indexOf(player.onStep);
  for (let i = idx + 1; i < steps.length; i++) if (steps[i]) return steps[i];
  return null;
}

function doJump() {
  if (challengeOn) return;
  if (!player.airborne) {
    const tgt = nextStep();
    if (!tgt) return;
    launchToStep(tgt);
  } else if (!player.djUsed && powers.wing > 0) {
    powers.wing--; player.djUsed = true;
    const tgt = player.toStep;
    if (tgt) launchToStep(tgt, true);
    else player.vy = -10;
    spawnParts(player.x + PW / 2, player.y + PH, '#22d3ee', 8);
    showFB('DOBLE SALTO!', 'pow'); updateHUD();
  }
}

function launchToStep(tgt, isDouble) {
  const sw = getStepW();
  player.toStep = tgt;
  player.airborne = true;
  if (!isDouble) { player.djUsed = false; }
  const tx = tgt.x + sw / 2 - PW / 2;
  const dx = tx - player.x;
  const dy = (tgt.y - PH) - player.y;
  const t = 22;
  player.vy = (dy - 0.5 * GRAV * t * t) / t;
  if (player.vy > -5) player.vy = -5;
  player.vx = dx / t;
  player.dir = dx >= 0 ? 1 : -1;
  if (!isDouble) spawnParts(player.x + PW / 2, player.y + PH, '#6366f1', 5);
}

function usePow(k) {
  if (k === 'wing') { doJump(); return; }
  if (k === 'shield' && powers.shield > 0) {
    powers.shield--; player.shielded = true;
    showFB('Escudo activado!', 'pow'); updateHUD(); return;
  }
  if (k === 'reveal' && powers.reveal > 0 && challengeOn && currentQ) {
    powers.reveal--;
    document.querySelectorAll('.ob').forEach((b, i) => {
      if (i !== currentQ.ans) b.style.opacity = '0.25';
    });
    showFB('Pista revelada!', 'pow'); updateHUD(); return;
  }
}

function showChallenge() {
  challengeOn = true;
  currentQ = QUESTIONS[Math.floor(Math.random() * QUESTIONS.length)];
  document.getElementById('cq').textContent = currentQ.q;
  const co = document.getElementById('co'); co.innerHTML = '';
  currentQ.opts.forEach((o, i) => {
    const b = document.createElement('button');
    b.className = 'ob'; b.textContent = o;
    b.onclick = () => answer(i, currentQ.ans, b);
    co.appendChild(b);
  });
  document.getElementById('cp').style.transform = 'translateY(0)';
}

function answer(chosen, correct, btn) {
  document.querySelectorAll('.ob').forEach((b, i) => {
    b.disabled = true; if (i === correct) b.classList.add('ok');
  });
  if (chosen === correct) {
    btn.classList.add('ok');
    const bonus = 5 + floor + (streak >= 3 ? 3 : 0);
    score += bonus; streak++;
    showFB(streak >= 3 ? 'Racha x' + streak + '! +' + bonus : 'Correcto! +' + bonus, 'ok');
    setTimeout(() => {
      document.getElementById('cp').style.transform = 'translateY(100%)';
      challengeOn = false; player.shielded = false;
      floor++;
      if (player.onStep && player.onStep.hasPow) collectPow(player.onStep);
      scrollCamToPlayer();
      updateHUD();
    }, 750);
  } else {
    btn.classList.add('bad'); streak = 0;
    if (player.shielded) {
      showFB('El escudo te salvó!', 'pow');
      player.shielded = false;
      setTimeout(() => {
        document.getElementById('cp').style.transform = 'translateY(100%)';
        challengeOn = false; floor++;
        scrollCamToPlayer(); updateHUD();
      }, 750);
    } else {
      lives--; showFB('Incorrecto! -vida', 'fail'); updateHUD();
      setTimeout(() => {
        document.getElementById('cp').style.transform = 'translateY(100%)';
        challengeOn = false;
        if (lives <= 0) { endGame(); return; }
        updateHUD();
      }, 750);
    }
  }
}

function scrollCamToPlayer() {
  const screenY = player.y - camY;
  const target = H * 0.55;
  if (screenY < target) { camY -= (target - screenY); }
}

function collectPow(s) {
  const names = ['wing', 'shield', 'reveal'];
  const labels = ['Doble Salto', 'Escudo', 'Pista'];
  const icons = ['🦅', '🛡️', '🔍'];
  const t = s.powType ?? rand(0, 2);
  powers[names[t]]++; s.hasPow = false;
  showFB(icons[t] + ' ' + labels[t] + '!', 'pow');
  spawnParts(s.x + getStepW() / 2, s.y - camY, '#fbbf24', 10);
  updateHUD();
}

function showFB(msg, type) {
  const fm = document.getElementById('fm');
  fm.textContent = msg; fm.className = 'sh ' + type;
  clearTimeout(fm._t); fm._t = setTimeout(() => { fm.className = ''; }, 1300);
}

function endGame() {
  running = false;
  document.getElementById('go').style.display = 'flex';
  document.getElementById('gop').textContent = 'Piso ' + floor + ' | ' + score + ' puntos';
}

function spawnParts(x, y, color, n) {
  for (let i = 0; i < n; i++)
    particles.push({ x, y, vx: (Math.random() - .5) * 5, vy: -Math.random() * 4 - 1, life: 1, color, r: 2 + Math.random() * 3 });
}

let lastT = 0;
function loop(ts) {
  if (!running) return;
  const dt = Math.min((ts - lastT) / 16.67, 2.5); lastT = ts;
  ctx.clearRect(0, 0, W, H);
  drawBG(); bobT += 0.05 * dt;

  if (!challengeOn) {
    if (keys['a'] || keys['A'] || keys['ArrowLeft']) { player.x -= 2.8 * dt; player.dir = -1; }
    if (keys['d'] || keys['D'] || keys['ArrowRight']) { player.x += 2.8 * dt; player.dir = 1; }
    player.x = Math.max(0, Math.min(W - PW, player.x));

    if (player.airborne) {
      player.vy += GRAV * dt;
      player.x += player.vx * dt;
      player.y += player.vy * dt;
      player.walkT += 0.25 * dt;

      const sw = getStepW();
      let landed = false;
      for (let i = 0; i < steps.length && !landed; i++) {
        const s = steps[i];
        const prevY = player.y - player.vy * dt;
        if (player.vy >= 0 &&
            prevY + PH <= s.y + 4 &&
            player.y + PH >= s.y &&
            player.y + PH <= s.y + SH + 12 &&
            player.x + PW > s.x + 2 && player.x < s.x + sw - 2) {
          player.y = s.y - PH;
          player.vy = 0; player.vx = 0;
          player.airborne = false;
          player.onStep = s;
          player.djUsed = false;
          spawnParts(player.x + PW / 2, player.y + PH - camY, s.color, 4);
          landed = true;
          if (!s.done) {
            s.done = true;
            if (s.hasPow) collectPow(s);
            setTimeout(() => { if (running && !challengeOn) showChallenge(); }, 200);
          }
        }
      }

      const screenY = player.y - camY;
      if (screenY > H + 60) { endGame(); return; }

    } else {
      const cs = player.onStep;
      if (cs) {
        const sw = getStepW();
        const tx = cs.x + sw / 2 - PW / 2;
        player.x += (tx - player.x) * 0.18;
        player.y = cs.y - PH;
      }
      player.walkT += 0.08 * dt;
    }
  }

  ensureSteps();
  drawSteps(); drawPlayer(); drawParts(dt);
  requestAnimationFrame(loop);
}

function toScreen(worldY) { return worldY - camY; }

function drawBG() {
  ctx.fillStyle = '#07071a'; ctx.fillRect(0, 0, W, H);
  const sp = [[40,30],[120,80],[250,20],[370,55],[500,15],[600,70],[80,150],[300,130],[450,95],[620,140],[160,200],[340,185],[560,210],[90,260],[430,240],[650,280]];
  sp.forEach(([sx, sy]) => {
    const b = 0.35 + 0.35 * Math.sin(bobT * 0.6 + sx * .05);
    ctx.globalAlpha = b; ctx.fillStyle = '#fff';
    const ry = ((sy - camY * 0.1) % H + H) % H;
    ctx.fillRect(sx % W, ry, 1.5, 1.5);
  }); ctx.globalAlpha = 1;
}

function drawSteps() {
  const sw = getStepW();
  steps.forEach(s => {
    const sy = toScreen(s.y);
    if (sy > H + 30 || sy < -40) return;
    ctx.fillStyle = s.color;
    ctx.beginPath(); ctx.roundRect(s.x, sy, sw, SH, 4); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(s.x, sy, sw, SH, 4); ctx.stroke();
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.beginPath(); ctx.roundRect(s.x + 4, sy + SH, sw - 8, 5, [0, 0, 3, 3]); ctx.fill();
    ctx.textAlign = 'center';
    if (s.hasPow) {
      const g = 0.55 + 0.45 * Math.sin(bobT * 3 + s.id);
      ctx.globalAlpha = g; ctx.font = '12px sans-serif';
      const icons = ['🦅', '🛡️', '🔍'];
      ctx.fillStyle = '#fff'; ctx.fillText(icons[s.powType ?? 0] + ' PODER', s.x + sw / 2, sy - 4);
      ctx.globalAlpha = 1;
    } else if (!s.done) {
      ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.font = 'bold 9px sans-serif';
      ctx.fillText('PREGUNTA', s.x + sw / 2, sy - 3);
    } else {
      ctx.fillStyle = 'rgba(134,239,172,.7)'; ctx.font = '10px sans-serif';
      ctx.fillText('OK', s.x + sw / 2, sy - 3);
    }
  });
}

function drawPlayer() {
  const px = player.x;
  const py = toScreen(player.y);
  ctx.save(); ctx.translate(px + PW / 2, py + PH / 2);
  if (player.shielded) {
    ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 2;
    ctx.globalAlpha = 0.5 + 0.3 * Math.sin(bobT * 5);
    ctx.beginPath(); ctx.arc(0, -2, 18, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 1;
  }
  ctx.fillStyle = '#1e3a5f';
  ctx.beginPath(); ctx.roundRect(-11, 4, 22, 14, 3); ctx.fill();
  ctx.fillStyle = '#fbbf24';
  ctx.beginPath(); ctx.roundRect(-10, -13, 20, 18, 4); ctx.fill();
  ctx.fillStyle = '#fde68a';
  ctx.beginPath(); ctx.arc(0, -16, 8, 0, Math.PI * 2); ctx.fill();
  const ex = player.dir * 2;
  ctx.fillStyle = '#1e293b';
  ctx.beginPath(); ctx.arc(ex - 2.2, -17, 1.7, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(ex + 2.2, -17, 1.7, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#93c5fd';
  if (player.airborne) {
    ctx.beginPath(); ctx.roundRect(-12, 5, 8, 11, 3); ctx.fill();
    ctx.beginPath(); ctx.roundRect(4, 5, 8, 11, 3); ctx.fill();
  } else {
    const w = Math.sin(player.walkT * 2) * 5;
    ctx.save(); ctx.translate(-7, 7); ctx.rotate(w * Math.PI / 180);
    ctx.beginPath(); ctx.roundRect(-3.5, 0, 7, 11, 3); ctx.fill(); ctx.restore();
    ctx.save(); ctx.translate(7, 7); ctx.rotate(-w * Math.PI / 180);
    ctx.beginPath(); ctx.roundRect(-3.5, 0, 7, 11, 3); ctx.fill(); ctx.restore();
  }
  ctx.restore();
}

function drawParts(dt) {
  particles = particles.filter(p => {
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 0.1 * dt; p.life -= 0.03 * dt;
    if (p.life <= 0) return false;
    ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2); ctx.fill();
    return true;
  }); ctx.globalAlpha = 1;
}

// ── CONTROLES TECLADO ──
const gw = document.getElementById('gw');
gw.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['w', 'W', 'ArrowUp', ' '].includes(e.key)) { e.preventDefault(); if (!jumpPressed) { jumpPressed = true; doJump(); } }
  if (e.key === 'e' || e.key === 'E') usePow('wing');
  if (e.key === 'r' || e.key === 'R') usePow('shield');
  if (e.key === 'f' || e.key === 'F') usePow('reveal');
});
gw.addEventListener('keyup', e => {
  keys[e.key] = false;
  if (['w', 'W', 'ArrowUp', ' '].includes(e.key)) jumpPressed = false;
});
gw.addEventListener('click', () => gw.focus());

// ── CONTROLES TÁCTILES ──
function setupTouchBtn(id, onDown, onUp) {
  const el = document.getElementById(id);
  if (!el) return;
  const down = (e) => { e.preventDefault(); el.classList.add('pressed'); if (onDown) onDown(); };
  const up = (e) => { e.preventDefault(); el.classList.remove('pressed'); if (onUp) onUp(); };
  el.addEventListener('touchstart', down, { passive: false });
  el.addEventListener('touchend', up, { passive: false });
  el.addEventListener('touchcancel', up, { passive: false });
  // También soportar mouse (para probar en escritorio)
  el.addEventListener('mousedown', down);
  el.addEventListener('mouseup', up);
  el.addEventListener('mouseleave', up);
}

setupTouchBtn('tc-left',
  () => { keys['a'] = true; },
  () => { keys['a'] = false; }
);
setupTouchBtn('tc-right',
  () => { keys['d'] = true; },
  () => { keys['d'] = false; }
);
setupTouchBtn('tc-jump',
  () => { if (!jumpPressed) { jumpPressed = true; doJump(); } },
  () => { jumpPressed = false; }
);
setupTouchBtn('tc-pow0', () => usePow('wing'));
setupTouchBtn('tc-pow1', () => usePow('shield'));
setupTouchBtn('tc-pow2', () => usePow('reveal'));

// Poderes en la barra
document.getElementById('pw0').addEventListener('touchstart', e => { e.preventDefault(); usePow('wing'); }, { passive: false });
document.getElementById('pw1').addEventListener('touchstart', e => { e.preventDefault(); usePow('shield'); }, { passive: false });
document.getElementById('pw2').addEventListener('touchstart', e => { e.preventDefault(); usePow('reveal'); }, { passive: false });
document.getElementById('pw0').onclick = () => usePow('wing');
document.getElementById('pw1').onclick = () => usePow('shield');
document.getElementById('pw2').onclick = () => usePow('reveal');

document.getElementById('sb').onclick = () => {
  document.getElementById('ss').style.display = 'none';
  gw.focus(); initGame(); running = true;
  requestAnimationFrame(ts => { lastT = ts; loop(ts); });
};
document.getElementById('rb').onclick = () => {
  initGame(); running = true; gw.focus();
  requestAnimationFrame(ts => { lastT = ts; loop(ts); });
};

// Mostrar controles táctiles si es dispositivo touch
if (window.matchMedia('(hover: none) and (pointer: coarse)').matches) {
  document.getElementById('touch-controls').style.display = 'flex';
}
</script>
